# Stereotype -> boosted ontology namespace prefixes for suggestion ranking.
# Editable copy may be placed in the deployed plugin directory to override these
# defaults without a rebuild. Prefixes match the catalog files' @prefix names.
# Trace: v3 plan section 1 (StereotypeRouter)

# Organizational (actual) elements -> W3C ORG. Values containing ':' are exact-concept
# pins from the methodology tables (Tutorial A: ActualOrganization -> org:Organization).
ActualOrganization=org:Organization,org
ActualPost=org:Post,org
ActualPerson=org
ActualOrganizationalResource=org

# Strategy / motivation -> OMG BMM (+ UAF 1.3 strategic layer)
# Owner decision: UAF 1.3 is the primary metamodel until polished; UAFSML/KerML/SysMLv2
# routing gets first-class treatment in a later phase.
Capability=uaf:Capability,uaf,bmm
EnterpriseGoal=bmm:Goal,bmm
EnterprisePhase=uaf,bmm
Goal=bmm:Goal,bmm

# Logical operational layer -> UAF 1.3
OperationalPerformer=uaf:OperationalPerformer,uaf
OperationalActivity=uaf:OperationalActivity,uaf
OperationalArchitecture=uaf:OperationalArchitecture,uaf

# Physical / resource layer -> UAF 1.3 resources + SUMO + domain ontologies
ResourcePerformer=uaf:ResourcePerformer,uaf,sumo
ResourceArtifact=uaf:ResourceArtifact,uaf,sumo,emmo
Block=sumo,emmo,uaf
System=sumo,uaf

# Requirements / structure (secondary until UAF 1.3 is polished)
Requirement=uaf,uafsml
PartUsage=sysml2,kerml
PartDefinition=sysml2,kerml

# Test fixture stereotype used by the integration suite
SemanticAlignment=uaf,uafsml
