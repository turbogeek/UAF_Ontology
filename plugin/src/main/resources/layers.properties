# UAF architecture layer -> boosted ontology namespace prefixes for scope-aware suggestions.
# The layer shifts the search toward the layer's ABSTRACTION: operational -> logical (uaf),
# resource -> physical (cco/sumo/qudt), strategic -> motivation (bmm). An editable copy may be
# placed in the deployed plugin directory to override these defaults without a rebuild. Prefixes
# match the catalog files' @prefix names.
# Trace: design/use_cases.md UC-2.8 (LayerRouter)

# Strategic / motivation layer -> OMG BMM + UAF strategic
STRATEGIC=bmm,uaf

# Operational (logical) layer -> UAF operational namespace
OPERATIONAL=uaf

# Service layer -> UAF service namespace
SERVICE=uaf

# Resource (physical) layer -> Common Core / SUMO / EMMO / QUDT physical grounding + UAF resources
RESOURCE=cco,sumo,emmo,qudt,uaf

# Personnel / actual organizational layer -> W3C ORG + UAF actual
PERSONNEL=org,uaf
ACTUAL=org,uaf

# Security layer -> UAF security (+ CCO for physical security artifacts)
SECURITY=uaf,cco

# Project layer -> UAF project (+ BMM for goals/milestones)
PROJECT=uaf,bmm

# Parameters / measurements layer -> QUDT quantities & units
PARAMETERS=qudt,cco
