# Human-readable metadata for catalog ontologies:  key = shortName | fullName | description
# The key is an ontology id (catalog file base name) or namespace prefix; lookup collapses
# family ids (qudt-schema/qudt-units -> qudt, imce-mission -> imce, uaf_ontology -> uaf).
# Editable copy may be placed in the deployed plugin directory to add/override entries without
# a rebuild. Trace: owner request - "don't just say 'from cco', what is cco?"

# --- Foundational / upper ontologies ---
bfo  = BFO  | Basic Formal Ontology (BFO) | ISO/IEC 21838-2 top-level ontology; splits the world into continuants (objects) and occurrents (processes). The shared upper level under CCO and much of OBO.
cco  = CCO  | Common Core Ontologies (CCO) | Eleven mid-level ontologies extending BFO (agents, artifacts, events, information, geospatial, units, quality...). U.S. DoD/IC-developed; widely used for defense & UAF work.
sumo = SUMO | Suggested Upper Merged Ontology (SUMO) | A large formal upper ontology with broad common-sense coverage; IEEE-originated.
gufo = gUFO | gentle Unified Foundational Ontology (gUFO) | A lightweight OWL rendering of UFO (Unified Foundational Ontology); the foundational layer UAF concepts are mapped to.

# --- Systems engineering / architecture frameworks ---
uaf     = UAF     | Unified Architecture Framework (UAF) | The OMG enterprise-architecture framework (strategic, operational, service, resource, personnel, security, projects layers). The primary metamodel this tool instruments.
uafsml  = UAFML   | UAF Systems Modeling Language (UAFML) | The SysML profile that realizes UAF in a modeling tool.
kerml   = KerML   | Kernel Modeling Language (KerML) | The semantic core beneath SysML v2 (OMG).
sysml2  = SysMLv2 | Systems Modeling Language v2 (SysML v2) | OMG's next-generation systems modeling language.
imce    = IMCE    | IMCE / openCAESAR SE vocabularies | JPL Integrated Model-Centric Engineering foundation vocabularies (components, functions, missions, analyses, projects), converted from OML via openCAESAR (Apache-2.0).
bmm     = BMM     | Business Motivation Model (BMM) | The OMG standard for ends, means, goals, strategies and influencers - the motivation/strategic layer.

# --- W3C / measurement / governance ---
org    = W3C ORG   | W3C Organization Ontology (ORG) | Organizations, formal roles, posts, and membership - the actual/personnel structures.
qudt   = QUDT      | Quantities, Units, Dimensions & Data Types (QUDT) | The QUDT.org standard for physical quantity kinds, units and dimensions - measurements, MOEs and TPMs.
prov   = PROV-O    | W3C Provenance Ontology (PROV-O) | Entities, activities and agents describing how data/artifacts were produced - the provenance of an alignment.
odrl   = ODRL      | Open Digital Rights Language (ODRL) | W3C policy language for permissions, prohibitions and duties - licensing/rights of models and data.
dpv    = DPV       | Data Privacy Vocabulary (DPV) | W3C vocabulary for privacy & GDPR concepts (personal data, purposes, legal bases, processing).
dcat   = DCAT      | Data Catalog Vocabulary (DCAT) | W3C vocabulary for describing datasets and data catalogs.
