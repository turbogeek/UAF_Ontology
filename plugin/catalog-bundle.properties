# Permissive ontology bundle fetched at BUILD time into the deployed catalog (never committed
# to git - owner policy: store only the URL config, download on demand). Each entry is
# <local-name>=<url>; the Gradle 'fetchCatalogBundle' task downloads to build/catalog-bundle/
# and deployPlugin copies them into <plugin>/catalog/ where CatalogLoader indexes them.
# All entries are permissively licensed (safe to redistribute in the deployed plugin).
#
# UAF Resources/Organizations/Actuals backbone (BFO-based, DoD/IC-aligned) -- BSD-3-Clause
cco=https://raw.githubusercontent.com/CommonCoreOntology/CommonCoreOntologies/develop/src/cco-merged/CommonCoreOntologiesMerged.ttl
# Basic Formal Ontology 2020 (CCO's upper) -- CC-BY-4.0
bfo=https://raw.githubusercontent.com/BFO-ontology/BFO-2020/master/21838-2/owl/bfo-core.ttl
# Units / quantity kinds for MOE/TPM alignment -- QUDT, CC-BY-4.0 (indexed as qudt:QuantityKind / qudt:Unit)
qudt-schema=https://raw.githubusercontent.com/qudt/qudt-public-repo/main/src/main/rdf/schema/SCHEMA_QUDT.ttl
qudt-quantitykinds=https://raw.githubusercontent.com/qudt/qudt-public-repo/main/src/main/rdf/vocab/quantitykinds/VOCAB_QUDT-QUANTITY-KINDS-ALL.ttl
qudt-units=https://raw.githubusercontent.com/qudt/qudt-public-repo/main/src/main/rdf/vocab/unit/VOCAB_QUDT-UNITS-ALL.ttl
# Governance / certification / approval domain -- W3C open (audit provenance, policy, privacy)
prov-o=https://www.w3.org/ns/prov-o.ttl
odrl=https://www.w3.org/ns/odrl/2/ODRL22.ttl
dpv=https://raw.githubusercontent.com/w3c/dpv/master/2.2/dpv/dpv.ttl
